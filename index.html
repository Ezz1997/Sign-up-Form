<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Story+Script&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="main">
      <div class="left-side">
        <h1>Photo by <i style="text-decoration: underline;">Ahmed Almakhzanji</i> on <i style="text-decoration: underline;">Unsplash</i></h1>
      </div>
      <div class="right-side">
        <h1>
          This some kind of title for the form but it's not part of the form
          itself, and I don't know what to call it to be honest...
        </h1>
        <form action="" method="post">
          <h1>Let's do this!</h1>
          <div class="input-group">
            <div class="input-container">
              <label for="firstname">FIRST NAME</label>
              <input type="text" id="firstname" name="firstname" />
            </div>
            <div class="input-container">
              <label for="lastname">LAST NAME</label>
              <input type="text" id="lastname" name="lastname" />
            </div>
          </div>
          <div class="input-group">
            <div class="input-container">
              <label for="email">EMAIL</label>
              <input type="email" id="email" name="email" />
            </div>
            <div class="input-container">
              <label for="phone-number">PHONE NUMBER</label>
              <input type="tel" id="phone-number" name="phone-number" />
            </div>
          </div>
          <div class="input-group">
            <div class="input-container">
              <label for="password">PASSWORD</label>
              <input type="password" id="password" name="password" />
            </div>
            <div class="input-container">
              <label for="confirm-password">CONFIRM PASSWORD</label>
              <input
                type="password"
                id="confirm-password"
                name="confirm-password"
              />
            </div>
          </div>
          <button type="submit">Create Account</button>
        </form>
      </div>
    </main>
  </body>
</html>
